name: Atay-Test

services:
  db:
    image: postgres:18.3-bookworm
    volumes:
      - ./data/db_data:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - 5433:5432

  backend:
    build: .
    ports:
      - 8085:8085
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
